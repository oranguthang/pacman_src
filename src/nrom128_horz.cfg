SYMBOLS {
    __STACKSIZE__: type = weak, value = $0500;
    NES_MAPPER:    type = weak, value = 0;
    NES_PRG_BANKS: type = weak, value = 1;
    NES_CHR_BANKS: type = weak, value = 1;
    NES_MIRRORING: type = weak, value = 0;
}

MEMORY {
    ZP:     file = "", start = $0002, size = $001A, type = rw, define = yes;
    HEADER: file = %O, start = $0000, size = $0010, fill = yes;
    ROM0:   file = %O, start = $C000, size = $3FFA, fill = yes, define = yes;
    ROMV:   file = %O, start = $FFFA, size = $0006, fill = yes;
    ROM2:   file = %O, start = $0000, size = $2000, fill = yes;
    SRAM:   file = "", start = $0300, size = __STACKSIZE__, define = yes;
    RAM:    file = "", start = $6000, size = $0200, define = yes;
    RAM2:   file = "", start = $6200, size = $0200, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,               type = zp;
    HEADER:   load = HEADER,           type = ro;
    STARTUP:  load = ROM0,             type = ro, define = yes;
    LOWCODE:  load = ROM0,             type = ro, optional = yes;
    ONCE:     load = ROM0,             type = ro, optional = yes;
    CODE:     load = ROM0,             type = ro, define = yes;
    RODATA:   load = ROM0,             type = ro, define = yes;
    DATA:     load = ROM0, run = RAM,  type = rw, define = yes;
    VECTORS:  load = ROMV,             type = rw;
    CHARS:    load = ROM2,             type = rw, optional = yes;
    BSS:      load = RAM,              type = bss, define = yes;
    BSS2:     load = RAM2,             type = bss, define = yes;
}

FEATURES {
    CONDES: type = constructor, label = __CONSTRUCTOR_TABLE__, count = __CONSTRUCTOR_COUNT__, segment = ONCE;
    CONDES: type = destructor, label = __DESTRUCTOR_TABLE__, count = __DESTRUCTOR_COUNT__, segment = RODATA;
    CONDES: type = interruptor, label = __INTERRUPTOR_TABLE__, count = __INTERRUPTOR_COUNT__, segment = RODATA, import = __CALLIRQ__;
}
